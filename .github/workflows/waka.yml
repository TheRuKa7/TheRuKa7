name: Wakatime Stats

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHOW_TITLE: "false"
          SHOW_TIME: "true"
          SHOW_TOTAL: "true"
          BLOCKS: "░▒▓█"
          TIME_RANGE: "last_7_days"
          LANG_COUNT: "8"
          LAYOUT: "compact"
